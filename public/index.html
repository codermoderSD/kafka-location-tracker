<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kafka Location sharing app</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      #map {
        height: 80vh;
      }
    </style>
  </head>
  <body>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/socket.io/socket.io.js"></script>
    <h1>Kafka Location sharing app</h1>
    <div id="map"></div>

    <script>
      const socket = io();
      const map = L.map("map").setView([19.11, 72.93], 13);

      const remoteMarkers = new Map();

      socket.on("server:location:update", (data) => {
        const { id, latitude, longitude } = data;
        if (!remoteMarkers.has(id)) {
          const marker = L.marker([latitude, longitude]);
          marker.addTo(map).bindPopup(socket.id);
          remoteMarkers.set(id, marker);
        } else {
          const existingMarker = remoteMarkers.get(id);
          existingMarker.setLatLng([latitude, longitude]);
        }
      });

      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution:
          '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      }).addTo(map);

      function getUserCurrentLocation() {
        return new Promise((res, rej) => {
          if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                const latitude = position.coords.latitude;
                const longitude = position.coords.longitude;
                console.log(latitude, longitude);
                res({ latitude, longitude });
              },
              (err) => {
                console.log(`Error getting position`, err);
                return rej(err);
              },
              { enableHighAccuracy: true },
            );
          } else {
            console.log("Geolocation is not available");
          }
        });
      }

      let myCurrentLocationMarker = null;

      async function main() {
        setInterval(async () => {
          const { latitude, longitude } = await getUserCurrentLocation();
          socket.emit("client:location:update", { latitude, longitude });
          if (!myCurrentLocationMarker) {
            myCurrentLocationMarker = L.marker([latitude, longitude]);
            myCurrentLocationMarker.addTo(map).bindPopup("You are here");
          } else {
            myCurrentLocationMarker.setLatLng([latitude, longitude]);
          }
        }, 5 * 1000);
      }

      window.addEventListener("load", main);
    </script>
  </body>
</html>
